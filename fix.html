<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>앱 새로고침 / 캐시 청소</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
         background:#f3f4f6; color:#1f2937; padding:20px; line-height:1.6; }
  .card { max-width:560px; margin:0 auto; background:#fff; border-radius:14px; padding:22px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
  h1 { font-size:20px; margin:0 0 14px; }
  .status { font-size:15px; margin:6px 0; }
  .ok { color:#059669; font-weight:600; }
  .warn { color:#b45309; }
  .box { background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:12px; margin:14px 0; font-size:13px; word-break:break-all; }
  .box b { display:block; margin-bottom:6px; color:#374151; }
  .sw-url { font-family: ui-monospace, Menlo, monospace; font-size:12px; color:#1d4ed8; }
  button { width:100%; padding:16px; font-size:17px; font-weight:700; border:none; border-radius:10px;
           background:#1d4ed8; color:#fff; margin-top:16px; cursor:pointer; }
  button:active { background:#1e40af; }
  .small { font-size:12px; color:#6b7280; margin-top:14px; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid #c7d2fe; border-top-color:#1d4ed8;
             border-radius:50%; animation:spin .8s linear infinite; vertical-align:-3px; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>🔄 앱 캐시 청소</h1>
  <div id="log"></div>
  <div id="swbox" class="box" style="display:none;">
    <b>이 기기에 등록된 서비스워커</b>
    <div id="swlist" class="sw-url"></div>
  </div>
  <div id="done" style="display:none;">
    <button onclick="openApp()">✅ 완료 — 앱 열기</button>
  </div>
  <div class="small">이 페이지는 옛 앱 파일(캐시)만 지웁니다. 입력하신 자료·로그인 정보에는 전혀 영향이 없습니다.</div>
</div>

<script>
  var logEl = document.getElementById('log');
  function line(html, cls){ var d=document.createElement('div'); d.className='status '+(cls||''); d.innerHTML=html; logEl.appendChild(d); }

  function openApp(){ location.href = 'index.html?_v=' + Date.now(); }

  (async function(){
    line('<span class="spinner"></span>확인 중...');

    // 1) 서비스워커 조회 + 화면에 표시 (진단)
    var urls = [];
    try {
      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        var regs = await navigator.serviceWorker.getRegistrations();
        regs.forEach(function(r){
          var u = (r.active && r.active.scriptURL) || (r.installing && r.installing.scriptURL) || (r.waiting && r.waiting.scriptURL) || '(scriptURL 없음) scope: ' + r.scope;
          urls.push(u);
        });
        if (urls.length) {
          document.getElementById('swbox').style.display='block';
          document.getElementById('swlist').innerHTML = urls.map(function(u){ return '• ' + u; }).join('<br>');
        }
        // 2) 서비스워커 전부 해제
        for (var i=0;i<regs.length;i++){ try { await regs[i].unregister(); } catch(e){} }
        line(regs.length ? ('서비스워커 ' + regs.length + '개 해제 완료') : '등록된 서비스워커 없음', 'ok');
      } else {
        line('이 브라우저는 서비스워커를 쓰지 않음', 'ok');
      }
    } catch(e){ line('서비스워커 처리 중 일부 오류(무시 가능)', 'warn'); }

    // 3) 캐시 스토리지 전부 삭제
    try {
      if (window.caches) {
        var keys = await caches.keys();
        for (var j=0;j<keys.length;j++){ try { await caches.delete(keys[j]); } catch(e){} }
        line('앱 캐시 ' + keys.length + '개 삭제 완료', 'ok');
      }
    } catch(e){ line('캐시 삭제 중 일부 오류(무시 가능)', 'warn'); }

    line('<b>청소 완료!</b> 아래 버튼으로 앱을 다시 여세요.', 'ok');
    document.getElementById('done').style.display='block';
  })();
</script>
</body>
</html>
